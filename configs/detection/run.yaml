# Base config for run_det.py (one arm x seed run). Hydra composes dataset/model/arm.
# NOTE (Stage 0 stub): values refined as Stage 1 modules land.
defaults:
  - dataset: tt100k
  - model: yolo11n
  - arm: zero_aug
  - _self_

seed: 42
K: 0.5                 # budget multiplier, fixed for Paper 3 (bm050)
project: experiments   # per-run outputs under experiments/{dataset}/
smoke: false

training:
  batch: 16
  imgsz: 640
  deterministic: true
  patience: 0          # early stopping OFF (optimizer steps equalized across arms)
  total_steps: null    # equalized step budget; measured from Zero-Aug in Stage 1
  optimizer: SGD       # placeholder; confirmed in Stage 1

eval:
  conf: 0.001
  nms_iou: 0.5         # global NMS across tiles at panorama level
  run_on_test: false   # holdout: val during development, test only for final report
