# Main experiment grid: 10 arms x 7 seeds = 70 runs. K=0.5 fixed.
# (mask arms + photometric_full + signgen_controlnet anexados após os 42 originais; resumível,
#  não retreina o que existe. mask arms exigem cache SAM (reproduce.py --step build_masks);
#  signgen_controlnet exige o verificador (scripts/detection/train_verifier.py) + GPU.)
# batch_run_det.py expands (arm x seed) -> run entries, writes batch_status_det.json.
name: full_grid_det
dataset: tt100k
K: 0.5
seeds: [0, 1, 2, 3, 4, 5, 6]
# order: cheap arms first (diffusion validated in parallel), see p3-plano-experimentos.
# signgen_controlnet ao fim: braço-chave (placa sintética vs copy_paste), append resumível.
arms: [zero_aug, da_only, real_duplicate, bg_photometric, bg_photometric_mask, copy_paste, copy_paste_mask, diffusion_bg, photometric_full, signgen_controlnet]
eval: {run_on_test: false}   # test only at final report
