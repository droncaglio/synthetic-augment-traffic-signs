# Copy-Paste: real sign RELOCATED into another real image's background (new position).
# The one arm that relocates -> has a placement manifest. Common runtime aug + synthetic.
name: copy_paste
runtime_aug: {fliplr: 0.0, flipud: 0.0, hsv_h: 0.015, hsv_s: 0.7, hsv_v: 0.4, mosaic: 0.0, scale: 0.5, translate: 0.1}
synthetic:
  enabled: true
  generator: copy_paste
  scale_jitter: 0.2       # +-20% resize (legacy copy_paste_offline default)
  max_paste_per_image: 3
  max_overlap_iou: 0.3
