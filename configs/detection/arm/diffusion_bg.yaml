# Diffusion-Bg: real sign fixed, inpaint the BACKGROUND (inverted mask) via FluxFill.
# Expensive context. Common runtime aug + offline synthetic.
name: diffusion_bg
runtime_aug: {fliplr: 0.5, flipud: 0.0, hsv_h: 0.015, hsv_s: 0.7, hsv_v: 0.4, mosaic: 0.0, scale: 0.5, translate: 0.1}
synthetic:
  enabled: true
  generator: diffusion_bg
  prompt: "an empty urban street scene, road, buildings, sky, realistic photo"
  negative_prompt: "traffic sign, road sign, signboard, text, watermark"
  use_lora: true          # domain LoRA trained on other/ backgrounds (train-only)
  lora_backgrounds: other # nosign panoramas pool
  scan_conf: 0.25         # hallucinated-sign detector threshold -> drop/regenerate
  max_regen: 3            # fallback to bg_photometric after this many failures
