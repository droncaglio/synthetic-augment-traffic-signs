# Sign-Gen (template+ControlNet): a SYNTHETIC sign (official template -> ControlNet-canny +
# color-anchor -> degraded to real size -> class-verified) pasted into a real background tile.
# Paired 1:1 with copy_paste (same deterministic placement) -> the only variable is
# synthetic-vs-real sign. Common runtime aug + offline synthetic.
name: signgen_controlnet
runtime_aug: {fliplr: 0.0, flipud: 0.0, hsv_h: 0.015, hsv_s: 0.7, hsv_v: 0.4, mosaic: 0.0, scale: 0.5, translate: 0.1}
synthetic:
  enabled: true
  generator: signgen_controlnet
  scale_jitter: 0.2
  max_paste_per_image: 3
  max_overlap_iou: 0.3
