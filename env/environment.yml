# Conda environment for the synthetic-augment-traffic-signs detection pipeline
# (Paper 3 / WVC). Dedicated env (NOT the shared longtail-synth) because the
# diffusion deps (diffusers/peft) are heavy and pin-sensitive.
#
# GPU: RTX Ada (24 GB), CUDA 12.1 / PyTorch 2.5 (same box as Paper 1).
# Create:   conda env create -f env/environment.yml
# Activate: conda activate augment-traffic-signs
name: augment-traffic-signs
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python>=3.11,<3.12
  - pip
  # --- PyTorch (GPU). Drop nvidia channel + pytorch-cuda for CPU-only. ---
  - pytorch::pytorch>=2.5,<2.6
  - pytorch::torchvision
  - pytorch::pytorch-cuda=12.1
  - pip:
      # --- detection backbone ---
      - ultralytics>=8.2.0
      # --- imaging / data ---
      - opencv-python
      - pillow
      - numpy
      - pandas
      - pyarrow
      - scikit-image>=0.22
      - imagehash>=4.3        # perceptual hash for panorama near-duplicate grouping
      - albumentations>=1.4   # background photometric perturbation arm
      # --- config / orchestration ---
      - pyyaml
      - hydra-core>=1.3
      - omegaconf
      - rich
      - tqdm
      - requests
      # --- statistics / plotting ---
      - scipy>=1.13.0
      - statsmodels>=0.14.0
      - matplotlib
      - seaborn
      # --- diffusion (Diffusion-Bg arm only; heavy) ---
      - diffusers>=0.30
      - transformers>=4.44
      - peft>=0.12
      - accelerate>=0.30
      - safetensors>=0.4.0
      - huggingface_hub>=0.23
